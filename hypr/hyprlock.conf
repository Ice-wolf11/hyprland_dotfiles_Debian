general {
    disable_loading_bar = true
    hide_cursor = false
}

background {
    monitor =
    path = screenshot

    blur_passes = 2
    blur_size = 3

    noise = 0.00
    contrast = 1.05

    brightness = 1.05

    vibrancy = 0.35
    vibrancy_darkness = 0.0
}

