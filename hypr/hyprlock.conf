# ==========================
# RELOJ
# ==========================

label {
    monitor =

    text = cmd[update:1000] echo "$(date +"%H:%M")"

    color = rgba(ffffffee)

    font_size = 90
    font_family = JetBrainsMono Nerd Font

    position = 0, 120
    halign = center
    valign = center
}

# ==========================
# FECHA
# ==========================

label {
    monitor =

    text = cmd[update:60000] echo "$(date +"%A, %d de %B")"

    color = rgba(cdd6f4dd)

    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, 40
    halign = center
    valign = center
}

# ==========================
# USUARIO
# ==========================

label {
    monitor =

    text = $USER

    color = rgba(ffffffcc)

    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, -90
    halign = center
    valign = center
}

# ==========================
# PASSWORD
# ==========================

input-field {
    monitor =

    size = 320, 55

    outline_thickness = 2

    dots_size = 0.22
    dots_spacing = 0.18

    dots_center = true

    outer_color = rgba(cba6f7ff)
    inner_color = rgba(11111bcc)

    font_color = rgba(cdd6f4ff)

    fade_on_empty = false

    placeholder_text = Contraseña...

    check_color = rgba(89b4faff)
    fail_color = rgba(f38ba8ff)

    rounding = 14

    position = 0, -170

    halign = center
    valign = center
}

