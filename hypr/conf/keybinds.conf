$mainMod = SUPER

# Apps
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, B, exec, brave-browser
bind = $mainMod, E, exec, dolphin
#bind = $mainMod, SPACE, exec, rofi -show  drun
bind = $mainMod, SPACE, exec, rofi -show drun -theme ~/.config/rofi/themes/noctalia.rasi

# Window management
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod CTRL, V, togglefloating
bind = $mainMod CTRL, P, pseudo
bind = $mainMod SHIFT, K, alterzorder, top
bind = $mainMod SHIFT, J, alterzorder, bottom
 

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize windows
binde = $mainMod SHIFT, right, resizeactive, 30 0
binde = $mainMod SHIFT, left, resizeactive, -30 0
binde = $mainMod SHIFT, up, resizeactive, 0 -30
binde = $mainMod SHIFT, down, resizeactive, 0 30

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8

# Relative workspace navigation
bind = $mainMod CONTROL, right, workspace, r+1
bind = $mainMod CONTROL, left, workspace, r-1

# Move windows
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
# Relative move
bind = $mainMod CTRL ALT, right, movetoworkspace, r+1
bind = $mainMod CTRL ALT, left, movetoworkspace, r-1

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Alt-tab
#bind = ALT, TAB, cyclenext
bind = ALT, TAB, exec, ~/.config/hypr/scripts/window-switcher.sh

# Lock
bind = $mainMod, L, exec, hyprlock

# Screenshot
#bind = $mainMod SHIFT, P, exec, grim -g "$(slurp)" ~/Imágenes/screenshot.png

# Audio
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle


# =========================================================
# SCREENSHOTS
# =========================================================

bind = $mainMod, P, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, P, exec, grim - | wl-copy
bind = , Print, exec, grim ~/Imágenes/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Imágenes/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
#bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy

# =========================================================
# SCREEN RECORDING
# =========================================================

bind = $mainMod CTRL, R, exec, wf-recorder -g "$(slurp)" -f ~/Vídeos/Recordings/$(date +%Y-%m-%d_%H-%M-%S).mp4
bind = $mainMod CTRL SHIFT, R, exec, pkill wf-recorder



