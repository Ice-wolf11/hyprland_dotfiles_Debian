animations {
    enabled = yes

    # Curvas
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Animaciones generales
    animation = global,        1, 7, easeOutQuint

    # Ventanas
    animation = windows,       1, 4, easeOutQuint
    animation = windowsIn,     1, 4, easeOutQuint, popin 85%
    animation = windowsOut,    1, 3, quick, popin 85%

    # Bordes y fade
    animation = border,        1, 5, quick
    animation = fade,          1, 3, quick

    # Layers (launchers/widgets/noctalia)
    animation = layers,        1, 4, easeOutQuint
    animation = layersIn,      1, 4, easeOutQuint, fade
    animation = layersOut,     1, 3, quick, fade

    # Workspaces
    animation = workspaces,    1, 4, easeOutQuint

    # Zoom
    animation = zoomFactor,    1, 5, quick
}
