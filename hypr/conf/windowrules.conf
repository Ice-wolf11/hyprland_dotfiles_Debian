# =========================================================
# WINDOW RULES
# =========================================================

# ---------- CORE FIXES ----------

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags

    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# ---------- DIALOGS ----------

windowrule {
    name = dialogs-float

    match:title = ^(Open|Save|Confirm|Choose|File Operation Progress).*

    float = true
    center = true
}

windowrule {
    name = modal-dialogs

    match:modal = true

    float = true
    center = true
}

# ---------- FLOATING UTILITIES ----------

windowrule {
    name = float-pavucontrol

    match:class = ^(pavucontrol)$

    float = true
    center = true
}

windowrule {
    name = float-networkmanager

    match:class = ^(nm-connection-editor)$

    float = true
    center = true
}

windowrule {
    name = float-blueman

    match:class = ^(blueman-manager)$

    float = true
    center = true
}

# ---------- MULTIMEDIA ----------

windowrule {
    name = idle-inhibit-media

    match:class = ^(mpv|vlc|celluloid)$

    idle_inhibit = fullscreen
}

windowrule {
    name = idle-inhibit-browser

    match:class = ^(firefox|LibreWolf|brave-browser|chromium)$

    idle_inhibit = fullscreen
}

# ---------- PICTURE IN PICTURE ----------

windowrule {
    name = picture-in-picture

    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture).*

    float = true
    pin = true
    keep_aspect_ratio = true
    size = 500 300
}

# ---------- JETBRAINS FIX ----------

windowrule {
    name = jetbrains-fix

    match:class = ^(.jetbrains.)$
    match:title = ^(win[0-9]+)$

    no_initial_focus = true
}
